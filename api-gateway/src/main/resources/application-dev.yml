server.port: 8082
spring.cloud.gateway.server.webflux.routes:
  - id: auth-service
    uri: http://localhost:8081
    predicates:
      - Path=/api/auth/**,/oauth/**

  - id: task-service
    uri: http://localhost:8080
    predicates:
      - Path=/api/tasks/**

spring.security.oauth2.resourceserver.jwt.issuer-uri: http://localhost:9091/realms/master
keycloak.base-url: http://localhost:9091

logging:
  level:
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE
    org.springframework.web.reactive.function.client: DEBUG