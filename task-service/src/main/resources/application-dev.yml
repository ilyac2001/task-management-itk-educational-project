server.port: 8080
spring.datasource.url: jdbc:postgresql://localhost:5432/task_management

spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka.bootstrap-servers: localhost:29092

logging:
  level:
    org.springframework.jdbc.datasource.init: DEBUG
    org.springframework.boot.context.config: TRACE